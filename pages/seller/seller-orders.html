<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Orders — Shopora Seller</title>
  <link rel="stylesheet" href="../../css/style.css">$link
</head>
<body>
  <div class="sp-page-grid">
    <main class="sp-container" id="orders-content"></main>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/services/analyticsService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/utils/chartHelper.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!AuthService.hasRole('seller')) { window.location.href = 'seller-login.html'; return; }

      Components.injectDashboardHeader('seller');
      Components.injectSellerSidebar();
      renderOrders();
    });

    function renderOrders() {
      const seller = AuthService.getCurrentUser();
      const orders = OrderService.getOrdersBySeller(seller.id).reverse();

      document.getElementById('orders-content').innerHTML = `
        <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem;">
          Orders Management (${orders.length})
        </h2>

        ${orders.length ? `<div class="sp-table-wrap">
          <table class="sp-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Items</th>
                <th>Total</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(o => `<tr>
                <td style="font-family:monospace;font-size:.78rem;">${o.id}</td>
                <td>${o.items.map(i=>i.title.slice(0,20)).join(', ')}</td>
                <td>$${o.total.toFixed(2)}</td>
                <td>${o.date}</td>
                <td>
                  <span class="sp-badge ${o.status==='delivered'?'sp-badge-success':o.status==='shipped'?'sp-badge-info':'sp-badge-warning'}">
                    ${o.status}
                  </span>
                </td>
                <td>
                  ${o.status==='pending'?`<button class="sp-btn sp-btn-primary" style="padding:.3rem .6rem;font-size:.75rem;" onclick="setStatus('${o.id}','shipped')">Mark Shipped</button>`:''}
                  ${o.status==='shipped'?`<button class="sp-btn sp-btn-success" style="padding:.3rem .6rem;font-size:.75rem;" onclick="setStatus('${o.id}','delivered')">Mark Delivered</button>`:''}
                  ${o.status==='delivered'?'<span style="font-size:.75rem;color:var(--success);">Completed</span>':''}
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : '<div class="sp-empty"><div class="sp-empty-icon">📋</div><h3>No orders yet</h3></div>'}
      `;
    }

    function setStatus(id, status) {
      OrderService.updateStatus(id, status);
      Toast.show(`Order marked as ${status}.`, 'success');
      renderOrders();
    }
  </script>
</body>
</html>
