<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Analytics — Shopora Seller</title>
  <link rel="stylesheet" href="../../css/style.css">$link
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sp-page-grid">
    <main class="sp-container" id="analytics-content"></main>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/services/analyticsService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/utils/chartHelper.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!AuthService.hasRole('seller')) { window.location.href = 'seller-login.html'; return; }

      Components.injectDashboardHeader('seller');
      Components.injectSellerSidebar();

      const seller = AuthService.getCurrentUser();
      const stats = AnalyticsService.getSellerStats(seller.id);
      const orders = OrderService.getOrdersBySeller(seller.id);
      const avgOrder = orders.length ? (orders.reduce((s, o) => s + o.total, 0) / orders.length) : 0;
      const top = AnalyticsService.getSellerTopProducts(seller.id, 5);

      document.getElementById('analytics-content').innerHTML = `
        <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:1.5rem;">Analytics & Insights</h2>

        <div class="sp-stats-grid">
          <div class="sp-stat-card">
            <div class="sp-stat-label">Total Revenue</div>
            <div class="sp-stat-value" style="color:var(--success);">$${stats.revenue.toLocaleString()}</div>
          </div>
          <div class="sp-stat-card">
            <div class="sp-stat-label">Avg Order Value</div>
            <div class="sp-stat-value">$${avgOrder.toFixed(2)}</div>
          </div>
          <div class="sp-stat-card">
            <div class="sp-stat-label">Total Reviews</div>
            <div class="sp-stat-value">${stats.totalReviews}</div>
          </div>
          <div class="sp-stat-card">
            <div class="sp-stat-label">Conversion Rate</div>
            <div class="sp-stat-value">3.2%</div>
            <div class="sp-stat-sub">Simulated metric</div>
          </div>
        </div>

        <div class="sp-form-card" style="margin-top:2rem; background: var(--card); display:flex; justify-content:space-between; align-items:center;">
          <div>
            <h3 style="margin:0;">Available Balance</h3>
            <p style="color:var(--text-md);font-size:.9rem;margin-top:.25rem;">Funds available for withdrawal.</p>
          </div>
          <div style="display:flex; align-items:center; gap: 1rem;">
            <div style="font-size:1.5rem; font-weight:700; color:var(--success);">$${stats.revenue.toFixed(2)}</div>
            <button class="sp-btn sp-btn-primary" onclick="reqPayout()">Withdraw Funds</button>
          </div>
        </div>
        <div id="payout-history" style="margin-top:1rem; margin-bottom:2rem;"></div>

        <div class="sp-charts-row">
          <div class="sp-chart-card">
            <h4>Revenue Over Time</h4>
            <div class="sp-chart-wrap"><canvas id="rev-line-chart"></canvas></div>
          </div>
          <div class="sp-chart-card">
            <h4>Orders by Status</h4>
            <div class="sp-chart-wrap"><canvas id="status-donut"></canvas></div>
          </div>
        </div>

        ${top.length ? `<div class="sp-table-wrap">
          <div class="sp-table-header"><h3>Top Products by Engagement</h3></div>
          <table class="sp-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Avg Rating</th>
                <th>Reviews</th>
                <th>Stock</th>
              </tr>
            </thead>
            <tbody>
              ${top.map(p => `<tr>
                <td style="font-weight:500;">${p.title}</td>
                <td>
                  <span class="sp-stars">${'★'.repeat(Math.round(ProductService.getAvgRating(p)))}</span>
                  ${ProductService.getAvgRating(p)}
                </td>
                <td>${(p.reviews||[]).length}</td>
                <td>${p.stock}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : ''}
      `;

      try {
        const rd = AnalyticsService.getSellerRevenueChart(seller.id);

        if (rd.labels.length) {
          ChartHelper.createLine('rev-line-chart', rd.labels, rd.data, 'Revenue ($)', '#0ea5e9');
        } else {
          document.querySelector('#rev-line-chart').parentElement.innerHTML =
            '<p style="text-align:center;color:var(--text-muted);padding:2rem;">No data yet</p>';
        }

        ChartHelper.createDoughnut(
          'status-donut',
          ['Pending', 'Shipped', 'Delivered'],
          [stats.pendingOrders, stats.shippedOrders, stats.deliveredOrders]
        );
      } catch(e) {
        console.warn('Charts unavailable:', e.message);
      }

      renderPayouts(seller.id);
    });

    function renderPayouts(sellerId) {
      const payouts = AnalyticsService.getPayoutsBySeller(sellerId);
      if (!payouts.length) return;

      document.getElementById('payout-history').innerHTML = \`
        <div class="sp-table-wrap">
          <div class="sp-table-header"><h3>Recent Payout Requests</h3></div>
          <table class="sp-table">
            <thead><tr><th>ID</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>
              \${payouts.map(p => \`
                <tr>
                  <td>\${p.id}</td>
                  <td>\${p.date}</td>
                  <td style="font-weight:600;">$\${p.amount.toFixed(2)}</td>
                  <td>
                    <span class="sp-badge \${p.status==='approved'?'sp-badge-success':'sp-badge-warning'}">
                      \${p.status}
                    </span>
                  </td>
                </tr>
              \`).join('')}
            </tbody>
          </table>
        </div>
      \`;
    }

    function reqPayout() {
      const seller = AuthService.getCurrentUser();
      const amount = prompt('Enter amount to withdraw:');
      if (!amount || isNaN(amount) || amount <= 0) return;

      try {
        AnalyticsService.requestPayout(seller.id, parseFloat(amount));
        Toast.show('Withdrawal requested successfully', 'success');
        setTimeout(() => location.reload(), 1000);
      } catch (err) {
        Toast.show(err.message, 'error');
      }
    }
  </script>
</body>
</html>
