<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Order Confirmed — Shopora</title>
  <link rel="stylesheet" href="../../css/style.css">$link
</head>
<body>
  <div class="sp-container">
    <div class="sp-order-conf" id="conf-page"></div>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Components.injectCustomerNav();
      Components.injectFooter();

      const params = new URLSearchParams(window.location.search);

      // Support both single id= and multi ids= params
      const idsParam = params.get('ids') || params.get('id') || '';
      const orderIds = idsParam.split(',').filter(Boolean);
      const orders = orderIds.map(id => OrderService.getById(id)).filter(Boolean);

      // Calculate delivery from max deliveryDays across all order items
      let maxDeliveryDays = 3;
      orders.forEach(o => (o.items || []).forEach(item => {
        const prod = ProductService.getById(item.productId);
        if (prod && prod.deliveryDays && prod.deliveryDays > maxDeliveryDays) {
          maxDeliveryDays = prod.deliveryDays;
        }
      }));

      const delivery = new Date();
      delivery.setDate(delivery.getDate() + maxDeliveryDays);

      const grandTotal = orders.reduce((s, o) => s + o.total, 0);

      document.getElementById('conf-page').innerHTML = `
        <div class="sp-order-conf-icon">✓</div>
        <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:.5rem;">
          Order Placed Successfully!
        </h1>
        <p style="color:var(--text-muted);margin-bottom:1rem;">
          Thank you for shopping with Shopora.
        </p>

        ${orders.length ? orders.map(order => `
        <div class="sp-order-card" style="margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
            <span style="font-weight:700;">Order ID</span>
            <span style="font-family:monospace;color:var(--accent);">${order.id}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
            <span>Date</span>
            <span>${order.date}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
            <span>Status</span>
            <span class="sp-badge sp-badge-warning">${order.status}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
            <span>Est. Delivery</span>
            <span style="color:var(--success);font-weight:600;">
              ${delivery.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
            </span>
          </div>
          <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0;">
          <h4 style="margin-bottom:.75rem;">Items</h4>
          ${(order.items || []).map(i => `
            <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.9rem;">
              <span>${i.title} × ${i.quantity}</span>
              <span>$${((i.variantPrice || i.effectivePrice || i.price) * i.quantity).toFixed(2)}</span>
            </div>
          `).join('')}
          <div class="sp-summary-total">
            <span>Order Total</span>
            <span>$${order.total.toFixed(2)}</span>
          </div>
        </div>
        `).join('')
        : '<p style="color:var(--text-muted);">Order details unavailable.</p>'}

        ${orders.length > 1
          ? `<div style="text-align:center;font-size:1.1rem;font-weight:700;margin:.5rem 0;padding:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);">
               Grand Total: $${grandTotal.toFixed(2)}
             </div>`
          : ''}

        <div class="sp-btn-group" style="justify-content:center;margin-top:1.5rem;">
          <a href="index.html" class="sp-btn sp-btn-primary">Continue Shopping</a>
          <a href="profile.html" class="sp-btn sp-btn-outline">View Order History</a>
        </div>`;
    });
  </script>
</body>
</html>
