<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Shop All Products — Shopora</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ---- Search page layout ---- */
    .shop-hero{background:linear-gradient(135deg,#0b1523,#162033);color:#fff;border-radius:var(--radius-lg);padding:2rem 2.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;}
    .shop-hero::after{content:'';position:absolute;right:-40px;bottom:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(234,88,12,.12) 0%,transparent 70%);pointer-events:none;}
    .shop-hero h1{font-size:1.5rem;font-weight:800;margin-bottom:.3rem;}
    .shop-hero p{color:#94a3b8;font-size:.9rem;}
    .shop-hero-stats{display:flex;gap:2rem;}
    .shop-hero-stat{text-align:center;}
    .shop-hero-stat .val{font-size:1.4rem;font-weight:800;font-family:var(--font-heading);}
    .shop-hero-stat .lbl{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;}

    .shop-layout{display:grid;grid-template-columns:260px 1fr;gap:1.5rem;align-items:start;}

    /* ---- Filter sidebar ---- */
    .filter-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;position:sticky;top:88px;overflow:hidden;}
    .filter-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .filter-header h3{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:.4rem;}
    .filter-header button{background:none;border:none;color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;}
    .filter-section{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
    .filter-section:last-of-type{border-bottom:none;}
    .filter-section h4{font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.04em;}
    .filter-check{display:flex;align-items:center;gap:.55rem;margin-bottom:.45rem;font-size:.85rem;color:var(--text-md);cursor:pointer;padding:.2rem 0;transition:color var(--transition);}
    .filter-check:hover{color:var(--accent);}
    .filter-check input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
    .price-range{display:flex;gap:.5rem;align-items:center;}
    .price-range input{width:100%;padding:.45rem .6rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;text-align:center;outline:none;transition:border-color var(--transition);}
    .price-range input:focus{border-color:var(--accent);}
    .price-range span{color:var(--text-muted);font-size:.85rem;flex-shrink:0;}
    .star-filter{display:flex;gap:.3rem;flex-wrap:wrap;}
    .star-filter button{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.35rem .55rem;font-size:.75rem;cursor:pointer;color:var(--star);transition:all var(--transition);line-height:1;}
    .star-filter button:hover{border-color:var(--star);background:#fffbeb;}
    .star-filter button.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
    .filter-actions{padding:1rem 1.25rem;display:flex;gap:.5rem;}

    /* ---- Results area ---- */
    .results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem 1rem;}
    .results-bar h2{font-size:.95rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:.4rem;}
    .results-bar h2 span{color:var(--accent);font-weight:800;}
    .results-controls{display:flex;align-items:center;gap:.75rem;}
    .sort-select{padding:.4rem .75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;background:var(--card);color:var(--text-md);outline:none;cursor:pointer;}
    .sort-select:focus{border-color:var(--accent);}
    .view-toggle{display:flex;gap:2px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .view-toggle button{background:var(--card);border:none;padding:.35rem .55rem;cursor:pointer;color:var(--text-muted);transition:all var(--transition);}
    .view-toggle button.active{background:var(--nav-bg);color:#fff;}

    /* ---- Product grid — explicit 3-column ---- */
    .shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-bottom:2rem;}
    .shop-grid.two-col{grid-template-columns:repeat(2,1fr);}

    /* ---- Constrain cards so SVGs don't blow out ---- */
    .shop-grid .sp-card{width:100%;min-width:0;max-width:100%;}
    .shop-grid .sp-card-img{height:180px;width:100%;overflow:hidden;}
    .shop-grid .sp-card-img svg{max-width:100%;max-height:100%;width:100%;height:100%;display:block;}

    /* ---- Active filter tags ---- */
    .active-filters{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1rem;}
    .active-filter-tag{display:inline-flex;align-items:center;gap:.3rem;background:var(--accent-light);color:var(--accent);padding:.2rem .6rem;border-radius:999px;font-size:.72rem;font-weight:600;}
    .active-filter-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.8rem;line-height:1;padding:0 0 0 .1rem;}

    @media(max-width:1024px){.shop-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){
      .shop-layout{grid-template-columns:1fr;}
      .filter-panel{position:relative;top:0;}
      .shop-hero{flex-direction:column;align-items:flex-start;gap:1rem;}
      .shop-hero-stats{gap:1.5rem;}
    }
    @media(max-width:480px){.shop-grid{grid-template-columns:1fr 1fr;gap:.75rem;}}
  </style>
</head>
<body>
  <div class="sp-container">

    <!-- Shop Hero -->
    <div class="shop-hero">
      <div>
        <h1>Shop All Products</h1>
        <p>Browse our complete collection</p>
      </div>
      <div class="shop-hero-stats" id="shop-stats"></div>
    </div>

    <!-- Active filter tags -->
    <div class="active-filters" id="active-filters"></div>

    <div class="shop-layout">
      <!-- Filter Sidebar -->
      <div class="filter-panel">
        <div class="filter-header">
          <h3>⚙ Filters</h3>
          <button onclick="resetFilters()">Clear All</button>
        </div>

        <div class="filter-section">
          <h4>Category</h4>
          <div id="filter-categories"></div>
        </div>

        <div class="filter-section">
          <h4>Brand</h4>
          <div id="filter-brands"></div>
        </div>

        <div class="filter-section">
          <h4>Price Range</h4>
          <div class="price-range">
            <input type="number" id="filter-min-price" placeholder="$0">
            <span>to</span>
            <input type="number" id="filter-max-price" placeholder="$9999">
          </div>
        </div>

        <div class="filter-section">
          <h4>Min Rating</h4>
          <div class="star-filter" id="filter-rating"></div>
        </div>

        <div class="filter-actions">
          <button class="sp-btn sp-btn-primary sp-btn-block" onclick="applyFilters()" style="padding:.55rem;">Apply Filters</button>
        </div>
      </div>

      <!-- Results Area -->
      <div>
        <div class="results-bar">
          <h2 id="results-title">All Products <span id="results-count"></span></h2>
          <div class="results-controls">
            <select class="sort-select" id="sort-select" onchange="applyFilters()">
              <option value="">Sort: Relevance</option>
              <option value="newest">Newest First</option>
              <option value="price-low">Price: Low → High</option>
              <option value="price-high">Price: High → Low</option>
              <option value="rating">Highest Rated</option>
              <option value="popular">Most Popular</option>
            </select>
            <div class="view-toggle">
              <button class="active" id="grid3-btn" onclick="setView(3)" title="3 columns">▦</button>
              <button id="grid2-btn" onclick="setView(2)" title="2 columns">▤</button>
            </div>
          </div>
        </div>

        <div class="shop-grid" id="results-grid"></div>

        <div class="sp-empty" id="no-results" style="display:none;">
          <div class="sp-empty-icon">🔍</div>
          <h3>No products found</h3>
          <p style="margin:.5rem 0;">Try adjusting your filters or search terms.</p>
          <button class="sp-btn sp-btn-outline" onclick="resetFilters()" style="margin-top:.5rem;">Clear All Filters</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/services/analyticsService.js"></script>
  <script src="../../js/services/adminService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/utils/chartHelper.js"></script>
  <script src="../../js/components.js"></script>
  <script>
    let currentRating = 0;
    let currentView = 3;

    document.addEventListener('DOMContentLoaded', () => {
      Components.injectCustomerNav();
      Components.injectFooter();

      // Stats
      const allProds = ProductService.getAll();
      const cats = ProductService.getCategories();
      const brands = ProductService.getBrands();
      document.getElementById('shop-stats').innerHTML = `
        <div class="shop-hero-stat"><div class="val">${allProds.length}</div><div class="lbl">Products</div></div>
        <div class="shop-hero-stat"><div class="val">${cats.length}</div><div class="lbl">Categories</div></div>
        <div class="shop-hero-stat"><div class="val">${brands.length}</div><div class="lbl">Brands</div></div>
      `;

      buildFilterUI();

      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || '';
      const cat = params.get('category') || '';
      if (q) {
        const searchInput = document.getElementById('sp-global-search');
        if (searchInput) searchInput.value = q;
      }
      if (cat) {
        const cb = document.querySelector(`#filter-categories input[value="${cat}"]`);
        if (cb) cb.checked = true;
      }
      applyFilters();
    });

    function buildFilterUI() {
      const cats = ProductService.getCategories();
      document.getElementById('filter-categories').innerHTML = cats.map(c =>
        `<label class="filter-check"><input type="checkbox" value="${c}" onchange="applyFilters()"> ${c.charAt(0).toUpperCase() + c.slice(1)}</label>`
      ).join('');

      const brands = ProductService.getBrands();
      document.getElementById('filter-brands').innerHTML = brands.map(b =>
        `<label class="filter-check"><input type="checkbox" value="${b}" onchange="applyFilters()"> ${b}</label>`
      ).join('');

      const ratingEl = document.getElementById('filter-rating');
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.textContent = '★'.repeat(i) + '☆'.repeat(5 - i);
        btn.onclick = () => {
          currentRating = currentRating === i ? 0 : i;
          ratingEl.querySelectorAll('button').forEach((b, idx) =>
            b.classList.toggle('active', idx < currentRating)
          );
          applyFilters();
        };
        ratingEl.appendChild(btn);
      }
    }

    function setView(cols) {
      currentView = cols;
      const grid = document.getElementById('results-grid');
      grid.classList.toggle('two-col', cols === 2);
      document.getElementById('grid3-btn').classList.toggle('active', cols === 3);
      document.getElementById('grid2-btn').classList.toggle('active', cols === 2);
    }

    function applyFilters() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || document.getElementById('sp-global-search')?.value || '';

      const checkedCats = [...document.querySelectorAll('#filter-categories input:checked')].map(c => c.value);
      const checkedBrands = [...document.querySelectorAll('#filter-brands input:checked')].map(b => b.value);
      const minPrice = parseFloat(document.getElementById('filter-min-price').value) || undefined;
      const maxPrice = parseFloat(document.getElementById('filter-max-price').value) || undefined;
      const sort = document.getElementById('sort-select').value || undefined;

      let results = q ? ProductService.search(q) : ProductService.getAll();
      if (checkedCats.length) results = results.filter(p => checkedCats.includes(p.category));
      if (checkedBrands.length) results = results.filter(p => checkedBrands.includes(p.brand));
      if (minPrice !== undefined) results = results.filter(p => ProductService.getEffectivePrice(p) >= minPrice);
      if (maxPrice !== undefined) results = results.filter(p => ProductService.getEffectivePrice(p) <= maxPrice);
      if (currentRating > 0) results = results.filter(p => ProductService.getAvgRating(p) >= currentRating);

      if (sort) {
        switch (sort) {
          case 'price-low': results.sort((a, b) => ProductService.getEffectivePrice(a) - ProductService.getEffectivePrice(b)); break;
          case 'price-high': results.sort((a, b) => ProductService.getEffectivePrice(b) - ProductService.getEffectivePrice(a)); break;
          case 'rating': results.sort((a, b) => ProductService.getAvgRating(b) - ProductService.getAvgRating(a)); break;
          case 'newest': results.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)); break;
          case 'popular': results.sort((a, b) => (b.ratings||[]).length - (a.ratings||[]).length); break;
        }
      }

      // Update results header
      const titleEl = document.getElementById('results-title');
      const countEl = document.getElementById('results-count');
      if (q) {
        titleEl.innerHTML = `Results for "${q}" <span id="results-count">${results.length}</span>`;
      } else {
        titleEl.innerHTML = `All Products <span id="results-count">${results.length}</span>`;
      }

      // Active filter tags
      const tagsHtml = [];
      checkedCats.forEach(c => tagsHtml.push(`<span class="active-filter-tag">${c} <button onclick="removeFilter('cat','${c}')">×</button></span>`));
      checkedBrands.forEach(b => tagsHtml.push(`<span class="active-filter-tag">${b} <button onclick="removeFilter('brand','${b}')">×</button></span>`));
      if (minPrice !== undefined) tagsHtml.push(`<span class="active-filter-tag">Min $${minPrice} <button onclick="document.getElementById('filter-min-price').value='';applyFilters();">×</button></span>`);
      if (maxPrice !== undefined) tagsHtml.push(`<span class="active-filter-tag">Max $${maxPrice} <button onclick="document.getElementById('filter-max-price').value='';applyFilters();">×</button></span>`);
      if (currentRating > 0) tagsHtml.push(`<span class="active-filter-tag">${currentRating}+ Stars <button onclick="currentRating=0;document.querySelectorAll('#filter-rating button').forEach(b=>b.classList.remove('active'));applyFilters();">×</button></span>`);
      document.getElementById('active-filters').innerHTML = tagsHtml.join('');

      // Render grid
      const grid = document.getElementById('results-grid');
      const empty = document.getElementById('no-results');
      if (results.length) {
        grid.innerHTML = results.map(p => Components.renderProductCard(p)).join('');
        grid.style.display = '';
        empty.style.display = 'none';
      } else {
        grid.style.display = 'none';
        empty.style.display = '';
      }
    }

    function removeFilter(type, val) {
      if (type === 'cat') {
        const cb = document.querySelector(`#filter-categories input[value="${val}"]`);
        if (cb) cb.checked = false;
      } else if (type === 'brand') {
        const cb = document.querySelector(`#filter-brands input[value="${val}"]`);
        if (cb) cb.checked = false;
      }
      applyFilters();
    }

    function resetFilters() {
      document.querySelectorAll('.filter-panel input[type=checkbox]').forEach(c => c.checked = false);
      document.getElementById('filter-min-price').value = '';
      document.getElementById('filter-max-price').value = '';
      currentRating = 0;
      document.querySelectorAll('#filter-rating button').forEach(b => b.classList.remove('active'));
      document.getElementById('sort-select').value = '';
      applyFilters();
    }
  </script>
</body>
</html>
