<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Shop All Products — Shopora</title>
  <link rel="stylesheet" href="../../css/style.css">$link

  <style>
    /* ---- Search page layout ---- */
    .shop-hero {
      background: linear-gradient(135deg, #0b1523, #162033);
      color: #fff;
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .shop-hero::after {
      content: '';
      position: absolute;
      right: -40px;
      bottom: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(234,88,12,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .shop-hero h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: .3rem;
    }
    .shop-hero p {
      color: #94a3b8;
      font-size: .9rem;
    }
    .shop-hero-stats {
      display: flex;
      gap: 2rem;
    }
    .shop-hero-stat {
      text-align: center;
    }
    .shop-hero-stat .val {
      font-size: 1.4rem;
      font-weight: 800;
      font-family: var(--font-heading);
    }
    .shop-hero-stat .lbl {
      font-size: .7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .shop-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    /* ---- Filter sidebar ---- */
    .filter-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      position: sticky;
      top: 88px;
      overflow: hidden;
    }
    .filter-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .filter-header h3 {
      font-size: .95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .filter-header button {
      background: none;
      border: none;
      color: var(--accent);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-section {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .filter-section:last-of-type {
      border-bottom: none;
    }
    .filter-section h4 {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .65rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .filter-check {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: .45rem;
      font-size: .85rem;
      color: var(--text-md);
      cursor: pointer;
      padding: .2rem 0;
      transition: color var(--transition);
    }
    .filter-check:hover {
      color: var(--accent);
    }
    .filter-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .price-range {
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    .price-range input {
      width: 100%;
      padding: .45rem .6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .82rem;
      text-align: center;
      outline: none;
      transition: border-color var(--transition);
    }
    .price-range input:focus {
      border-color: var(--accent);
    }
    .price-range span {
      color: var(--text-muted);
      font-size: .85rem;
      flex-shrink: 0;
    }
    .star-filter {
      display: flex;
      gap: .3rem;
      flex-wrap: wrap;
    }
    .star-filter button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .35rem .55rem;
      font-size: .75rem;
      cursor: pointer;
      color: var(--star);
      transition: all var(--transition);
      line-height: 1;
    }
    .star-filter button:hover {
      border-color: var(--star);
      background: #fffbeb;
    }
    .star-filter button.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .filter-actions {
      padding: 1rem 1.25rem;
      display: flex;
      gap: .5rem;
    }

    /* ---- Results area ---- */
    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: .75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem 1rem;
    }
    .results-bar h2 {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .results-bar h2 span {
      color: var(--accent);
      font-weight: 800;
    }
    .results-controls {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .sort-select {
      padding: .4rem .75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .82rem;
      background: var(--card);
      color: var(--text-md);
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus {
      border-color: var(--accent);
    }
    .view-toggle {
      display: flex;
      gap: 2px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .view-toggle button {
      background: var(--card);
      border: none;
      padding: .35rem .55rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .view-toggle button.active {
      background: var(--nav-bg);
      color: #fff;
    }

    /* ---- Product grid — explicit 3-column ---- */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.1rem;
      margin-bottom: 2rem;
    }
    .shop-grid.two-col {
      grid-template-columns: repeat(2, 1fr);
    }

    /* ---- Constrain cards so SVGs don't blow out ---- */
    .shop-grid .sp-card {
      width: 100%;
      min-width: 0;
      max-width: 100%;
    }
    .shop-grid .sp-card-img {
      height: 180px;
      width: 100%;
      overflow: hidden;
    }
    .shop-grid .sp-card-img svg {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ---- Active filter tags ---- */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: 1rem;
    }
    .active-filter-tag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
    }
    .active-filter-tag button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: .8rem;
      line-height: 1;
      padding: 0 0 0 .1rem;
    }

    @media (max-width: 1024px) {
      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .shop-layout {
        grid-template-columns: 1fr;
      }
      .filter-panel {
        position: relative;
        top: 0;
      }
      .shop-hero {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .shop-hero-stats {
        gap: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .shop-grid {
        grid-template-columns: 1fr 1fr;
        gap: .75rem;
      }
    }
  </style>
</head>
<body>
  <div class="sp-container">

    <!-- Shop Hero -->
    <div class="shop-hero">
      <div>
        <h1>Shop All Products</h1>
        <p>Browse our complete collection</p>
      </div>
      <div class="shop-hero-stats" id="shop-stats"></div>
    </div>

    <!-- Active filter tags -->
    <div class="active-filters" id="active-filters"></div>

    <div class="shop-layout">

      <!-- Filter Sidebar -->
      <div class="filter-panel">
        <div class="filter-header">
          <h3>⚙ Filters</h3>
          <button onclick="resetFilters()">Clear All</button>
        </div>

        <div class="filter-section">
          <h4>Category</h4>
          <div id="filter-categories"></div>
        </div>

        <div class="filter-section">
          <h4>Brand</h4>
          <div id="filter-brands"></div>
        </div>

        <div class="filter-section">
          <h4>Price Range</h4>
          <div class="price-range">
            <input type="number" id="filter-min-price" placeholder="$0">
            <span>to</span>
            <input type="number" id="filter-max-price" placeholder="$9999">
          </div>
        </div>

        <div class="filter-section">
          <h4>Min Rating</h4>
          <div class="star-filter" id="filter-rating"></div>
        </div>

        <div class="filter-actions">
          <button
            class="sp-btn sp-btn-primary sp-btn-block"
            onclick="applyFilters()"
            style="padding:.55rem;">
            Apply Filters
          </button>
        </div>
      </div>

      <!-- Results Area -->
      <div>
        <div class="results-bar">
          <h2 id="results-title">
            All Products <span id="results-count"></span>
          </h2>
          <div class="results-controls">
            <select class="sort-select" id="sort-select" onchange="applyFilters()">
              <option value="">Sort: Relevance</option>
              <option value="newest">Newest First</option>
              <option value="price-low">Price: Low → High</option>
              <option value="price-high">Price: High → Low</option>
              <option value="rating">Highest Rated</option>
              <option value="popular">Most Popular</option>
            </select>
            <div class="view-toggle">
              <button class="active" id="grid3-btn" onclick="setView(3)" title="3 columns">▦</button>
              <button id="grid2-btn" onclick="setView(2)" title="2 columns">▤</button>
            </div>
          </div>
        </div>

        <div class="shop-grid" id="results-grid"></div>

        <div class="sp-empty" id="no-results" style="display:none;">
          <div class="sp-empty-icon">🔍</div>
          <h3>No products found</h3>
          <p style="margin:.5rem 0;">Try adjusting your filters or search terms.</p>
          <button
            class="sp-btn sp-btn-outline"
            onclick="resetFilters()"
            style="margin-top:.5rem;">
            Clear All Filters
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/components.js"></script>

<script src="../../js/pages/search.js"></script>
</body>
</html>
