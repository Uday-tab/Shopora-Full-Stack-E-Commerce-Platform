<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Forgot Password — Shopora</title>
  <link rel="stylesheet" href="../../css/style.css">$link
</head>
<body>
  <div class="sp-auth-container">
    <div class="sp-auth-card">
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your email to receive a reset link</p>

      <div class="sp-form-group">
        <label>Email</label>
        <input type="email" id="reset-email" placeholder="you@example.com">
      </div>

      <button class="sp-btn sp-btn-primary sp-btn-block" onclick="sendReset()">
        Send Reset Link
      </button>

      <p class="sp-auth-link">
        <a href="login.html">← Back to Sign In</a>
      </p>
    </div>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Components.injectCustomerNav();
      Components.injectFooter();
    });

    function sendReset() {
      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
        Toast.show('Please enter your email.', 'warn');
        return;
      }
      Toast.show('Password reset link sent! (Simulated)', 'success');
    }
  </script>
</body>
</html>
