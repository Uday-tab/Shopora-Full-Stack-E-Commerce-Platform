<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Admin Portal — Shopora</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="sp-auth-container">
    <div class="sp-auth-card" style="border-top:3px solid var(--danger);">
      <h1>Admin Portal</h1>
      <p class="subtitle">Platform management access</p>

      <div class="sp-form-group">
        <label>Email</label>
        <input type="email" id="a-email" value="admin@shopora.com">
      </div>

      <div class="sp-form-group">
        <label>Password</label>
        <input type="password" id="a-pass" value="admin123">
      </div>

      <button class="sp-btn sp-btn-danger sp-btn-block" onclick="doLogin()">Sign In as Admin</button>

      <p style="text-align:center;font-size:.75rem;color:var(--text-muted);margin-top:1rem;">
        Demo: admin@shopora.com / admin123
      </p>
    </div>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/services/analyticsService.js"></script>
  <script src="../../js/services/adminService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/utils/chartHelper.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    function doLogin() {
      const r = AuthService.login(
        document.getElementById('a-email').value,
        document.getElementById('a-pass').value,
        'admin'
      );

      if (r.success) {
        Toast.show('Welcome, Admin!', 'success');
        setTimeout(() => window.location.href = 'admin-dashboard.html', 600);
      } else {
        Toast.show(r.message, 'error');
      }
    }
  </script>
</body>
</html>
