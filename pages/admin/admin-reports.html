<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Shopora is a premium full-stack e-commerce simulation platform featuring multi-vendor portals, shopping carts, and dynamic dashboards.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>???</text></svg>">
  <title>Reports — Shopora Admin</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="sp-page-grid">
    <main class="sp-container" id="admin-reports"></main>
  </div>

  <script src="../../js/db/storage.js"></script>
  <script src="../../js/services/authService.js"></script>
  <script src="../../js/services/productService.js"></script>
  <script src="../../js/services/cartService.js"></script>
  <script src="../../js/services/orderService.js"></script>
  <script src="../../js/services/analyticsService.js"></script>
  <script src="../../js/services/adminService.js"></script>
  <script src="../../js/utils/logger.js"></script>
  <script src="../../js/utils/toast.js"></script>
  <script src="../../js/utils/chartHelper.js"></script>
  <script src="../../js/components.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!AuthService.hasRole('admin')) { window.location.href = 'admin-login.html'; return; }

      Components.injectDashboardHeader('admin');
      Components.injectAdminSidebar();
      renderReports();
    });

    function renderReports() {
      const reports = AdminService.getReports();

      document.getElementById('admin-reports').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;">
          <h2 style="font-size:1.3rem;font-weight:700;">Reports & Flags (${reports.length})</h2>
          <button class="sp-btn sp-btn-outline" onclick="createTestReport()">+ Create Test Report</button>
        </div>

        ${reports.length ? `<div class="sp-table-wrap">
          <table class="sp-table">
            <thead>
              <tr>
                <th>Report ID</th>
                <th>Type</th>
                <th>Target</th>
                <th>Reason</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${reports.map(r => `<tr>
                <td style="font-family:monospace;font-size:.78rem;">${r.id}</td>
                <td>${r.type||'general'}</td>
                <td>${r.targetId||'—'}</td>
                <td style="max-width:200px;">${r.reason||'—'}</td>
                <td>${r.date}</td>
                <td>
                  <span class="sp-badge ${r.status==='resolved'?'sp-badge-success':'sp-badge-warning'}">
                    ${r.status}
                  </span>
                </td>
                <td>
                  ${r.status!=='resolved'
                    ? `<button
                        class="sp-btn sp-btn-success"
                        style="padding:.3rem .6rem;font-size:.75rem;"
                        onclick="resolveR('${r.id}')"
                      >Resolve</button>`
                    : '<span style="font-size:.75rem;color:var(--success);">Done</span>'}
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>` : `<div class="sp-empty">
          <div class="sp-empty-icon">🎉</div>
          <h3>No reports filed</h3>
          <p>The platform is clean! You can create a test report to see how this works.</p>
        </div>`}
      `;
    }

    function resolveR(id) {
      AdminService.resolveReport(id);
      Toast.show('Report resolved.', 'success');
      renderReports();
    }

    function createTestReport() {
      AdminService.createReport({
        type: 'review',
        targetId: 'prod-1',
        reason: 'Suspicious review flagged by automated system. Content may violate community guidelines.',
        reportedBy: 'system'
      });
      Toast.show('Test report created.', 'info');
      renderReports();
    }
  </script>
</body>
</html>
